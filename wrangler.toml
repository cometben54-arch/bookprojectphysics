name = "bookprojectphysics"
compatibility_date = "2024-09-01"
pages_build_output_dir = "."

# KV bindings are configured in the Cloudflare Dashboard:
#   Pages project -> Settings -> Bindings -> KV namespace
#   Variable name: BOOK_KV
#   KV namespace : (your created namespace)
#
# Do NOT add a [[kv_namespaces]] block here without a real ID — Cloudflare
# now reads wrangler.toml during Pages deploys and will fail with
# "Invalid KV namespace ID" if the id is a placeholder.
#
# If you prefer wrangler.toml over the Dashboard, uncomment and fill in:
# [[kv_namespaces]]
# binding = "BOOK_KV"
# id = "<your-real-kv-namespace-id-hex>"
